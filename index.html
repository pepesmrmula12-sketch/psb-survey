// ─── UI Components ────────────────────────────────────────────────────────────

function LikertRow({ qid, value, onChange, labels }) {
  const emojis = ["😞", "🙁", "😐", "🙂", "😊"];
  return (
    <div style={{ marginTop: 14 }}>
      <div style={{ display: "flex", gap: 6 }}>
        {[1, 2, 3, 4, 5].map(v => {
          const sel = value === v;
          return (
            <label key={v} style={{ flex: 1, cursor: "pointer" }}>
              <input type="radio" name={qid} value={v} checked={sel} onChange={() => onChange(v)} style={{ display: "none" }} />
              <div style={{ border: `2px solid ${sel ? C.amber : C.mist}`, borderRadius: 10, padding: "10px 4px", textAlign: "center", background: sel ? C.amber + "18" : C.white, transition: "all .18s", cursor: "pointer" }}>
                <div style={{ fontSize: 20, marginBottom: 2 }}>{emojis[v - 1]}</div>
                <div style={{ fontFamily: F.body, fontSize: 11, fontWeight: sel ? 700 : 400, color: sel ? C.amber : C.leaf }}>{v}</div>
              </div>
            </label>
          );
        })}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
        <span style={{ fontFamily: F.body, fontSize: 10, color: C.sage }}>{labels[0]}</span>
        <span style={{ fontFamily: F.body, fontSize: 10, color: C.sage }}>{labels[4]}</span>
      </div>
    </div>
  );
}

function FreqRow({ qid, value, onChange, labels }) {
  return (
    <div style={{ marginTop: 14 }}>
      <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
        {[1, 2, 3, 4, 5].map(v => {
          const sel = value === v;
          return (
            <label key={v} style={{ cursor: "pointer", minWidth: 56, flex: 1 }}>
              <input type="radio" name={qid} value={v} checked={sel} onChange={() => onChange(v)} style={{ display: "none" }} />
              <div style={{ border: `2px solid ${sel ? C.fern : C.mist}`, borderRadius: 8, padding: "8px 4px", textAlign: "center", background: sel ? C.fern + "15" : C.white, transition: "all .18s", cursor: "pointer" }}>
                <div style={{ fontFamily: F.body, fontSize: 10, fontWeight: sel ? 700 : 400, color: sel ? C.fern : C.leaf, lineHeight: 1.3 }}>{labels[v - 1]}</div>
              </div>
            </label>
          );
        })}
      </div>
    </div>
  );
}

function MultiSelect({ qid, value, onChange, options }) {
  const vals = value || [];
  const toggle = (opt) => {
    const next = vals.includes(opt) ? vals.filter(o => o !== opt) : [...vals, opt];
    onChange(next);
  };
  return (
    <div style={{ marginTop: 12, display: "flex", flexWrap: "wrap", gap: 7 }}>
      {options.map(opt => {
        const sel = vals.includes(opt);
        return (
          <div key={opt} onClick={() => toggle(opt)} style={{ padding: "7px 13px", borderRadius: 20, border: `2px solid ${sel ? C.fern : C.mist}`, background: sel ? C.fern + "18" : C.white, fontFamily: F.body, fontSize: 12, color: sel ? C.fern : C.bark, fontWeight: sel ? 700 : 400, cursor: "pointer", transition: "all .15s", userSelect: "none" }}>
            {sel ? "✓ " : ""}{opt}
          </div>
        );
      })}
    </div>
  );
}

function SingleSelect({ qid, value, onChange, options }) {
  const channelIcons = { WhatsApp: "💬", Email: "📧", "Correo electrónico": "📧", Instagram: "📸", Facebook: "👥", LinkedIn: "💼", YouTube: "▶️" };
  return (
    <div style={{ marginTop: 12, display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
      {options.map(opt => {
        const sel = value === opt;
        return (
          <div key={opt} onClick={() => onChange(opt)} style={{ padding: "12px 8px", borderRadius: 12, border: `2px solid ${sel ? C.amber : C.mist}`, background: sel ? C.amber + "15" : C.white, textAlign: "center", cursor: "pointer", transition: "all .18s", userSelect: "none" }}>
            <div style={{ fontSize: 22, marginBottom: 4 }}>{channelIcons[opt] || "📱"}</div>
            <div style={{ fontFamily: F.body, fontSize: 11, fontWeight: sel ? 700 : 400, color: sel ? C.amber : C.bark, lineHeight: 1.2 }}>{opt}</div>
          </div>
        );
      })}
    </div>
  );
}

function ScoreBar({ avg }) {
  const color = avg >= 4 ? C.leaf : avg >= 3 ? C.gold : C.apricot;
  return (
    <div style={{ background: C.parch, borderRadius: 4, height: 8, overflow: "hidden", marginTop: 8 }}>
      <div style={{ background: color, height: "100%", width: `${(avg / 5) * 100}%`, borderRadius: 4, transition: "width .6s ease" }} />
    </div>
  );
}

// ─── Results view ─────────────────────────────────────────────────────────────

function Results({ responses, sections, lang, onBack }) {
  const en = lang === "en";
  const allNums = Object.values(responses).filter(v => typeof v === "number");
  const overall = allNums.length
    ? (allNums.reduce((a, b) => a + b, 0) / allNums.length).toFixed(1)
    : "–";

  const sectionScores = sections.map(sec => {
    const vals = sec.questions
      .filter(q => q.type === "likert" || q.type === "freq")
      .map(q => responses[q.id])
      .filter(v => typeof v === "number");
    const avg = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
    return { id: sec.id, icon: sec.icon, title: sec.title, avg };
  });

  const textResponses = [];
  sections.forEach(sec => {
    sec.questions.filter(q => q.type === "text" && responses[q.id]).forEach(q => {
      textResponses.push({ section: sec.title, icon: sec.icon, question: q.text, answer: responses[q.id] });
    });
  });

  const multiResponses = [];
  sections.forEach(sec => {
    sec.questions.filter(q => (q.type === "multi" || q.type === "single") && responses[q.id]).forEach(q => {
      const val = responses[q.id];
      const answers = Array.isArray(val) ? val : [val];
      if (answers.length) multiResponses.push({ section: sec.title, icon: sec.icon, question: q.text, answers });
    });
  });

  return (
    <div style={{ padding: "0 16px 40px" }}>
      <div style={{ background: `linear-gradient(135deg, ${C.ink}, ${C.bark})`, borderRadius: 18, padding: "32px 24px", marginBottom: 22, textAlign: "center" }}>
        <div style={{ fontFamily: F.body, fontSize: 10, color: C.sage, letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>{en ? "Your Response Summary" : "Resumen de tu Respuesta"}</div>
        <div style={{ fontFamily: F.display, fontSize: 64, color: C.gold, lineHeight: 1 }}>{overall}</div>
        <div style={{ fontFamily: F.body, fontSize: 12, color: C.mist, marginTop: 6 }}>{en ? "/ 5.0 overall average" : "/ 5.0 media global"}</div>
      </div>

      <div style={{ fontFamily: F.display, fontSize: 22, color: C.ink, marginBottom: 12 }}>{en ? "Section Scores" : "Puntuaciones por Sección"}</div>
      <div style={{ display: "grid", gap: 10, marginBottom: 24 }}>
        {sectionScores.map(s => (
          <div key={s.id} style={{ background: C.white, borderRadius: 12, padding: "14px 16px", border: `1px solid ${C.parch}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontFamily: F.body, fontWeight: 700, fontSize: 13, color: C.ink }}>{s.icon} {s.title}</div>
              <div style={{ fontFamily: F.display, fontSize: 22, color: C.amber, fontWeight: 600 }}>{s.avg !== null ? s.avg.toFixed(1) : "–"}</div>
            </div>
            {s.avg !== null && <ScoreBar avg={s.avg} />}
          </div>
        ))}
      </div>

      {multiResponses.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontFamily: F.display, fontSize: 22, color: C.ink, marginBottom: 12 }}>{en ? "Your Selections" : "Tus Selecciones"}</div>
          {multiResponses.map((r, i) => (
            <div key={i} style={{ background: C.white, borderRadius: 12, padding: 16, border: `1px solid ${C.parch}`, marginBottom: 10 }}>
              <div style={{ fontFamily: F.body, fontSize: 10, color: C.amber, fontWeight: 700, textTransform: "uppercase", letterSpacing: .5, marginBottom: 4 }}>{r.icon} {r.section}</div>
              <div style={{ fontFamily: F.body, fontSize: 12, color: C.fern, fontStyle: "italic", marginBottom: 10 }}>{r.question}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {r.answers.map(a => (
                  <div key={a} style={{ background: C.fern + "18", border: `1.5px solid ${C.leaf}`, borderRadius: 16, padding: "5px 10px", fontFamily: F.body, fontSize: 11, color: C.fern, fontWeight: 700 }}>✓ {a}</div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {textResponses.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontFamily: F.display, fontSize: 22, color: C.ink, marginBottom: 12 }}>{en ? "Your Open Responses" : "Tus Respuestas Abiertas"}</div>
          {textResponses.map((r, i) => (
            <div key={i} style={{ background: C.sand, borderLeft: `4px solid ${C.amber}`, borderRadius: "0 10px 10px 0", padding: "14px 16px", marginBottom: 10 }}>
              <div style={{ fontFamily: F.body, fontSize: 10, color: C.amber, fontWeight: 700, textTransform: "uppercase", letterSpacing: .5, marginBottom: 3 }}>{r.icon} {r.section}</div>
              <div style={{ fontFamily: F.body, fontSize: 12, color: C.fern, fontStyle: "italic", marginBottom: 6 }}>{r.question}</div>
              <div style={{ fontFamily: F.body, fontSize: 13, color: C.ink, lineHeight: 1.6 }}>{r.answer}</div>
            </div>
          ))}
        </div>
      )}

      <button onClick={onBack} style={{ width: "100%", padding: 14, background: `linear-gradient(135deg, ${C.bark}, ${C.fern})`, color: C.white, border: "none", borderRadius: 10, fontFamily: F.body, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
        {en ? "← Back" : "← Volver"}
      </button>
    </div>
  );
}

// ─── Top bar ──────────────────────────────────────────────────────────────────

function TopBar({ lang, type, setLang, setType, resetSurvey }) {
  const en = lang === "en";
  return (
    <div style={{ background: C.ink, padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 30 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ width: 34, height: 34, background: `linear-gradient(135deg,${C.amber},${C.apricot})`, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17 }}>🍑</div>
        <div>
          <div style={{ fontFamily: F.display, fontSize: 14, color: C.cream, fontWeight: 600 }}>PSB Producción Vegetal</div>
          <div style={{ fontFamily: F.body, fontSize: 10, color: C.sage }}>360° Survey</div>
        </div>
      </div>
      <div style={{ display: "flex", gap: 5 }}>
        {[["internal", en ? "INTERNAL" : "INTERNO", C.fern], ["external", en ? "EXTERNAL" : "EXTERNO", C.amber]].map(([t, lbl, col]) => (
          <button key={t} onClick={() => { setType(t); resetSurvey(); }}
            style={{ padding: "5px 10px", background: type === t ? col : C.bark, color: type === t ? C.white : C.sage, border: "none", borderRadius: 7, fontFamily: F.body, fontSize: 10, fontWeight: 700, cursor: "pointer", transition: "all .18s" }}>{lbl}</button>
        ))}
        <div style={{ width: 1, background: C.fern, margin: "0 2px" }} />
        {["en", "es"].map(l => (
          <button key={l} onClick={() => { setLang(l); resetSurvey(); }}
            style={{ padding: "5px 10px", background: lang === l ? C.rust : C.bark, color: lang === l ? C.white : C.sage, border: "none", borderRadius: 7, fontFamily: F.body, fontSize: 10, fontWeight: 700, cursor: "pointer", transition: "all .18s" }}>{l.toUpperCase()}</button>
        ))}
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [lang, setLang]          = useState("en");
  const [type, setType]          = useState("internal");
  const [step, setStep]          = useState(-1);
  const [responses, setRes]      = useState({});
  const [role, setRole]          = useState("");
  const [dept, setDept]          = useState("");
  const [submitted, setSub]      = useState(false);
  const [submitting, setSubbing] = useState(false);
  const [submitError, setErr]    = useState("");
  const [showRes, setShowRes]    = useState(false);

  const { internal, external, likertLabels, freqLabels } = buildSurveys(lang);
  const survey   = type === "internal" ? internal : external;
  const sections = survey.sections;
  const total    = sections.length;
  const en       = lang === "en";

  const setR = (id, val) => setRes(r => ({ ...r, [id]: val }));

  const resetSurvey = () => {
    setStep(-1); setRes({}); setRole(""); setDept("");
    setSub(false); setSubbing(false); setErr(""); setShowRes(false);
  };

  const handleSubmit = async () => {
    setSubbing(true);
    setErr("");
    const allNums = Object.values(responses).filter(v => typeof v === "number");
    const overallScore = allNums.length
      ? parseFloat((allNums.reduce((a, b) => a + b, 0) / allNums.length).toFixed(2))
      : null;
    const table = type === "internal" ? TABLE_INTERNAL : TABLE_EXTERNAL;
    const fields = {
      "Timestamp":          new Date().toISOString(),
      "Language":           lang === "en" ? "English" : "Spanish",
      "Role / Organisation": role || "",
      "Country / Region":   dept || "",
      "Survey Type":        type === "internal" ? "Internal" : "External",
      "Overall Score":      overallScore,
      "All Responses":      JSON.stringify(responses),
    };
    try {
      if (AIRTABLE_KEY !== "YOUR_AIRTABLE_PERSONAL_ACCESS_TOKEN") {
        const res = await fetch(
          `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(table)}`,
          {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${AIRTABLE_KEY}`,
              "Content-Type":  "application/json",
            },
            body: JSON.stringify({ fields }),
          }
        );
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error?.message || "Airtable error");
        }
      }
      setSub(true);
    } catch (e) {
      setErr(en
        ? `Could not save your response: ${e.message}. Please try again.`
        : `No se pudo guardar tu respuesta: ${e.message}. Por favor inténtalo de nuevo.`);
    } finally {
      setSubbing(false);
    }
  };

  const pct = step < 0 ? 0 : Math.round(((step + 1) / total) * 100);

  if (submitted && !showRes) {
    return (
      <div style={{ minHeight: "100vh", background: C.sand }}>
        <style>{FONTS}</style>
        <TopBar lang={lang} type={type} setLang={setLang} setType={setType} resetSurvey={resetSurvey} />
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "80vh", padding: "24px 16px", textAlign: "center" }}>
          <div style={{ fontSize: 72, marginBottom: 16 }}>🌳</div>
          <div style={{ fontFamily: F.display, fontSize: 32, color: C.ink, marginBottom: 10 }}>{en ? "Thank you" : "Gracias"}</div>
          <div style={{ fontFamily: F.body, fontSize: 15, color: C.fern, maxWidth: 340, lineHeight: 1.7, marginBottom: 32 }}>
            {en
              ? "Your response has been recorded. Only PSB management can see the aggregated results."
              : "Tu respuesta ha sido registrada. Solo la dirección de PSB puede ver los resultados agregados."}
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
            <button onClick={() => setShowRes(true)} style={{ padding: "12px 22px", background: `linear-gradient(135deg,${C.amber},${C.rust})`, color: C.white, border: "none", borderRadius: 10, fontFamily: F.body, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              {en ? "View My Summary →" : "Ver mi resumen →"}
            </button>
            <button onClick={resetSurvey} style={{ padding: "12px 22px", background: `linear-gradient(135deg,${C.fern},${C.leaf})`, color: C.white, border: "none", borderRadius: 10, fontFamily: F.body, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              {en ? "Submit Another" : "Enviar otra respuesta"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (showRes) {
    return (
      <div style={{ minHeight: "100vh", background: C.sand }}>
        <style>{FONTS}</style>
        <TopBar lang={lang} type={type} setLang={setLang} setType={setType} resetSurvey={resetSurvey} />
        <div style={{ maxWidth: 640, margin: "0 auto" }}>
          <Results responses={responses} sections={sections} lang={lang} onBack={() => setShowRes(false)} />
        </div>
      </div>
    );
  }

  if (step === -1) {
    return (
      <div style={{ minHeight: "100vh", background: C.sand }}>
        <style>{FONTS}</style>
        <TopBar lang={lang} type={type} setLang={setLang} setType={setType} resetSurvey={resetSurvey} />
        <div style={{ maxWidth: 640, margin: "0 auto", padding: "0 16px 40px" }}>
          <div style={{ background: `linear-gradient(145deg, ${C.ink} 0%, ${C.bark} 60%, ${C.fern} 100%)`, borderRadius: "0 0 24px 24px", padding: "40px 28px 36px", marginBottom: 24, position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -30, right: -30, fontSize: 160, opacity: .05, pointerEvents: "none" }}>🍑</div>
            <div style={{ fontFamily: F.body, fontSize: 10, color: C.sage, letterSpacing: 3, textTransform: "uppercase", marginBottom: 8 }}>
              {type === "internal" ? (en ? "For PSB Team Members" : "Para el Equipo PSB") : (en ? "For Nursery & Commercial Partners" : "Para Viveros y Socios Comerciales")}
            </div>
            <div style={{ fontFamily: F.display, fontSize: 34, color: C.cream, lineHeight: 1.15, marginBottom: 10 }}>{survey.title}</div>
            <div style={{ fontFamily: F.body, fontSize: 13, color: C.sage }}>{survey.subtitle}</div>
          </div>

          <div style={{ background: C.white, borderRadius: 16, padding: 22, marginBottom: 18, border: `1px solid ${C.parch}` }}>
            <p style={{ fontFamily: F.body, fontSize: 14, color: C.fern, lineHeight: 1.75, margin: "0 0 20px" }}>{survey.intro}</p>
            <div style={{ display: "grid", gap: 10 }}>
              <div>
                <label style={{ fontFamily: F.body, fontSize: 11, color: C.leaf, fontWeight: 700, display: "block", marginBottom: 5, textTransform: "uppercase", letterSpacing: .5 }}>
                  {type === "internal" ? (en ? "Your Role (optional)" : "Tu Rol (opcional)") : (en ? "Your Organisation (optional)" : "Tu Organización (opcional)")}
                </label>
                <input value={role} onChange={e => setRole(e.target.value)} placeholder={survey.rolePlaceholder}
                  style={{ width: "100%", padding: "10px 12px", border: `1.5px solid ${C.mist}`, borderRadius: 9, fontFamily: F.body, fontSize: 13, color: C.ink, outline: "none", boxSizing: "border-box", background: C.sand }} />
              </div>
              <div>
                <label style={{ fontFamily: F.body, fontSize: 11, color: C.leaf, fontWeight: 700, display: "block", marginBottom: 5, textTransform: "uppercase", letterSpacing: .5 }}>
                  {en ? "Country / Region (optional)" : "País / Región (opcional)"}
                </label>
                <input value={dept} onChange={e => setDept(e.target.value)} placeholder={survey.deptPlaceholder}
                  style={{ width: "100%", padding: "10px 12px", border: `1.5px solid ${C.mist}`, borderRadius: 9, fontFamily: F.body, fontSize: 13, color: C.ink, outline: "none", boxSizing: "border-box", background: C.sand }} />
              </div>
            </div>
          </div>

          <div style={{ marginBottom: 20 }}>
            <div style={{ fontFamily: F.body, fontSize: 11, color: C.leaf, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>
              {en
                ? `${total} sections · ${sections.reduce((a, s) => a + s.questions.length, 0)} questions`
                : `${total} secciones · ${sections.reduce((a, s) => a + s.questions.length, 0)} preguntas`}
            </div>
            <div style={{ display: "grid", gap: 8 }}>
              {sections.map((s, i) => (
                <div key={s.id} style={{ background: C.white, borderRadius: 10, padding: "11px 14px", border: `1px solid ${C.parch}`, display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ fontSize: 20 }}>{s.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: F.body, fontSize: 10, color: C.amber, fontWeight: 700, letterSpacing: .5 }}>{en ? `Section ${i + 1}` : `Sección ${i + 1}`}</div>
                    <div style={{ fontFamily: F.display, fontSize: 15, color: C.ink }}>{s.title}</div>
                  </div>
                  <div style={{ fontFamily: F.body, fontSize: 11, color: C.sage }}>{s.questions.length}q</div>
                </div>
              ))}
            </div>
          </div>

          <button onClick={() => setStep(0)} style={{ width: "100%", padding: 16, background: `linear-gradient(135deg,${C.amber},${C.rust})`, color: C.white, border: "none", borderRadius: 12, fontFamily: F.body, fontWeight: 700, fontSize: 15, cursor: "pointer", letterSpacing: .5 }}>
            {en ? "Begin Survey →" : "Iniciar encuesta →"}
          </button>
        </div>
      </div>
    );
  }

  const sec = sections[step];
  return (
    <div style={{ minHeight: "100vh", background: C.sand }}>
      <style>{FONTS}</style>
      <TopBar lang={lang} type={type} setLang={setLang} setType={setType} resetSurvey={resetSurvey} />
      <div style={{ background: C.parch, height: 4, position: "sticky", top: 0, zIndex: 20 }}>
        <div style={{ background: `linear-gradient(90deg,${C.amber},${C.apricot})`, height: "100%", width: `${pct}%`, transition: "width .4s ease" }} />
      </div>

      <div style={{ maxWidth: 640, margin: "0 auto", padding: "0 16px 40px" }}>
        <div style={{ padding: "22px 0 16px" }}>
          <div style={{ fontFamily: F.body, fontSize: 10, color: C.amber, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 4 }}>
            {en ? `Section ${step + 1} of ${total}` : `Sección ${step + 1} de ${total}`}
          </div>
          <div style={{ fontFamily: F.display, fontSize: 26, color: C.ink, display: "flex", alignItems: "center", gap: 10 }}>
            <span>{sec.icon}</span> {sec.title}
          </div>
        </div>

        <div style={{ display: "grid", gap: 13, marginBottom: 24 }}>
          {sec.questions.map((q, qi) => (
            <div key={q.id} style={{ background: C.white, borderRadius: 14, padding: "18px 18px 20px", border: `1px solid ${C.parch}` }}>
              <div style={{ fontFamily: F.body, fontSize: 13.5, color: C.ink, lineHeight: 1.65 }}>
                <span style={{ color: C.amber, fontWeight: 700, marginRight: 6 }}>{qi + 1}.</span>{q.text}
              </div>
              {q.type === "likert" && (
                <LikertRow qid={q.id} value={responses[q.id]} onChange={v => setR(q.id, v)} labels={likertLabels} />
              )}
              {q.type === "freq" && (
                <FreqRow qid={q.id} value={responses[q.id]} onChange={v => setR(q.id, v)} labels={freqLabels} />
              )}
              {q.type === "multi" && (
                <MultiSelect qid={q.id} value={responses[q.id]} onChange={v => setR(q.id, v)} options={q.opts.options} />
              )}
              {q.type === "single" && (
                <SingleSelect qid={q.id} value={responses[q.id]} onChange={v => setR(q.id, v)} options={q.opts.options} />
              )}
              {q.type === "text" && (
                <textarea
                  value={responses[q.id] || ""}
                  onChange={e => setR(q.id, e.target.value)}
                  placeholder={en ? "Share your thoughts…" : "Comparte tus reflexiones…"}
                  rows={3}
                  style={{ width: "100%", marginTop: 12, padding: "10px 12px", border: `1.5px solid ${C.mist}`, borderRadius: 9, fontFamily: F.body, fontSize: 13, color: C.ink, outline: "none", resize: "vertical", boxSizing: "border-box", background: C.sand, lineHeight: 1.6 }}
                />
              )}
            </div>
          ))}
        </div>

        {submitError && (
          <div style={{ background: "#fdecea", border: `1.5px solid ${C.apricot}`, borderRadius: 10, padding: "12px 16px", marginBottom: 14, fontFamily: F.body, fontSize: 13, color: C.rust }}>
            {submitError}
          </div>
        )}

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => step === 0 ? setStep(-1) : setStep(step - 1)}
            style={{ flex: "0 0 auto", padding: "14px 18px", background: C.white, color: C.fern, border: `2px solid ${C.mist}`, borderRadius: 10, fontFamily: F.body, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
            ←
          </button>
          {step < total - 1 ? (
            <button onClick={() => setStep(step + 1)}
              style={{ flex: 1, padding: 14, background: `linear-gradient(135deg,${C.fern},${C.leaf})`, color: C.white, border: "none", borderRadius: 10, fontFamily: F.body, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
              {en ? "Next Section →" : "Siguiente →"}
            </button>
          ) : (
            <button onClick={handleSubmit} disabled={submitting}
              style={{ flex: 1, padding: 14, background: submitting ? C.sage : `linear-gradient(135deg,${C.amber},${C.rust})`, color: C.white, border: "none", borderRadius: 10, fontFamily: F.body, fontWeight: 700, fontSize: 14, cursor: submitting ? "not-allowed" : "pointer", transition: "all .2s" }}>
              {submitting ? (en ? "Saving…" : "Guardando…") : (en ? "Submit Survey ✓" : "Enviar encuesta ✓")}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
